name: Live Branch Monitor

on:
  schedule:
    - cron: '*/30 * * * *' # 30분마다 실행
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests discord-webhook

      - name: Run Monitor
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python monitor.py

      - name: Commit and Push State
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "MonitorBot"
          git add last_state.json
          git commit -m "Update last_state.json" || exit 0
          git push
